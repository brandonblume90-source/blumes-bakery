<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>

  <body>
    <!-- A little help for the Netlify post-processing bots -->

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
